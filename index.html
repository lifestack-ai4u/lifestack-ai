<!DOCTYPE html>
<html>
<head>
  <title>LifeStack AI</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    input {
      padding: 10px;
      width: 300px;
    }
    button {
      padding: 10px;
      background: green;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🤖 LifeStack AI</h1>

<input id="question" placeholder="Ask your decision..." />
<button onclick="askAI()">Ask</button>

<p id="result"></p>

<script>
async function askAI() {
  const q = document.getElementById("question").value;

  const res = await fetch("/api/ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ question: q })
  });

  const data = await res.json();
  document.getElementById("result").innerText = data.answer;
}
</script>

</body>
</html>
